name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'

jobs:
  node:
    name: Lint / Typecheck / Test (Node)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: worktrack
          POSTGRES_PASSWORD: worktrack
          POSTGRES_DB: worktrack
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U worktrack"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://worktrack:worktrack@localhost:5432/worktrack?schema=public
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @worktrack/database run generate

      - name: Build shared packages
        run: pnpm --filter @worktrack/shared --filter @worktrack/database run build

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm format:check

  rust:
    name: Build / Test (Rust agent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: System deps for Tauri (linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent/src-tauri
      - name: cargo check
        run: cargo check --all-targets
        continue-on-error: true # Tauri agent comes online in Phase 4; tolerate during Phases 1–3.
