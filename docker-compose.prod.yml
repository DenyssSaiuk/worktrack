name: worktrack-prod

# Production compose. Bring up with:
#   cp .env.example .env && edit .env
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# nginx-proxy + acme-companion handle TLS via Let's Encrypt automatically as
# long as DASHBOARD_HOST and BACKEND_HOST point at this host's public IP.

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.6
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/nginx/proxy.conf:/etc/nginx/conf.d/proxy.conf:ro
    labels:
      - 'com.github.nginx-proxy.nginx'

  acme-companion:
    image: nginxproxy/acme-companion:2.5
    restart: unless-stopped
    depends_on: [nginx-proxy]
    environment:
      DEFAULT_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/acme.sh

  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-worktrack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD:?}']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?}
    command: ['server', '/data', '--console-address', ':9001']
    volumes:
      - minio-data:/data

  backend:
    image: ghcr.io/${GH_OWNER:-worktrack}/worktrack-backend:${VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worktrack}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN}
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      MASTER_KEK_BASE64: ${MASTER_KEK_BASE64}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-worktrack}
      S3_FORCE_PATH_STYLE: 'true'
      VIRTUAL_HOST: ${BACKEND_HOST_PUBLIC:?set BACKEND_HOST_PUBLIC=api.worktrack.example.com}
      VIRTUAL_PORT: '4000'
      LETSENCRYPT_HOST: ${BACKEND_HOST_PUBLIC}
    secrets:
      - jwt-private.pem
      - jwt-public.pem

  workers:
    image: ghcr.io/${GH_OWNER:-worktrack}/worktrack-backend:${VERSION:-latest}
    restart: unless-stopped
    command: ['node', 'dist/workers/start.js']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worktrack}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      MASTER_KEK_BASE64: ${MASTER_KEK_BASE64}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-worktrack}
      S3_FORCE_PATH_STYLE: 'true'
    secrets:
      - jwt-private.pem
      - jwt-public.pem

  dashboard:
    image: ghcr.io/${GH_OWNER:-worktrack}/worktrack-dashboard:${VERSION:-latest}
    restart: unless-stopped
    depends_on: [backend]
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: ${BACKEND_URL_PUBLIC:?https://api.worktrack.example.com}
      VIRTUAL_HOST: ${DASHBOARD_HOST_PUBLIC:?set DASHBOARD_HOST_PUBLIC=worktrack.example.com}
      VIRTUAL_PORT: '3000'
      LETSENCRYPT_HOST: ${DASHBOARD_HOST_PUBLIC}

secrets:
  jwt-private.pem:
    file: ./secrets/jwt-private.pem
  jwt-public.pem:
    file: ./secrets/jwt-public.pem

volumes:
  postgres-data:
  redis-data:
  minio-data:
  certs:
  vhost:
  html:
  acme:
