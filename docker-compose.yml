name: worktrack-dev

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: worktrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: worktrack
      POSTGRES_PASSWORD: worktrack
      POSTGRES_DB: worktrack
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U worktrack -d worktrack']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: worktrack-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: worktrack-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: worktrack-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: worktrack
      MINIO_ROOT_PASSWORD: worktrack-dev-secret
    command: ['server', '/data', '--console-address', ':9001']
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:
