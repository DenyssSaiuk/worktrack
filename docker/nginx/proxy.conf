# Larger upload limit for screenshots, longer keepalive for the WebSocket
# live channel, and a few hardening defaults that the nginx-proxy image
# drops into nginx for every vhost.

client_max_body_size 16m;
proxy_read_timeout   90s;
proxy_send_timeout   90s;

# Strict transport security — applied for every vhost the proxy fronts.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header X-Frame-Options           "DENY" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
